<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>9. Sınıf Algoritma Tasarım Paneli</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f0f2f5; }
        header { background: #24292e; color: white; padding: 1rem; text-align: center; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #toolbar { width: 250px; background: #fff; border-right: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        #canvas { flex: 1; position: relative; overflow: auto; background: white; background-image: radial-gradient(#ddd 1px, transparent 1px); background-size: 20px 20px; }
        #console { width: 300px; background: #1e1e1e; color: #00ff00; padding: 15px; font-family: monospace; overflow-y: auto; }
        
        .node { 
            position: absolute; padding: 10px; min-width: 120px; text-align: center; 
            cursor: move; user-select: none; border: 2px solid #333; background: white;
            display: flex; flex-direction: column; gap: 5px;
        }
        
        /* 9. Sınıf Standart Şekilleri */
        .start-end { border-radius: 50px; background: #ffecb3; } /* Elips */
        .process { background: #e3f2fd; } /* Dikdörtgen */
        .input-output { transform: skew(-15deg); background: #f1f8e9; } /* Paralelkenar */
        .input-output * { transform: skew(15deg); }
        .decision { border: 2px solid #333; background: #fce4ec; transform: rotate(45deg); width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
        .decision-content { transform: rotate(-45deg); font-size: 12px; }

        button { cursor: pointer; padding: 8px; border: 1px solid #ddd; background: #fff; transition: 0.3s; }
        button:hover { background: #eee; }
        .run-btn { background: #28a745; color: white; border: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h2>9. Sınıf Algoritma ve Akış Şeması Paneli</h2>
</header>

<div id="main">
    <div id="toolbar">
        <h3>İşlemler</h3>
        <button onclick="addNode('start-end', 'BAŞLA')">⚪ Başlangıç (Elips)</button>
        <button onclick="addNode('input-output', 'Giriş: Sayı')">▱ Veri Girişi</button>
        <button onclick="addNode('process', 'İşlem Seç')">▭ İşlem (Matematik)</button>
        <button onclick="addNode('decision', 'Karar')">◇ Karar (Eğer)</button>
        <button onclick="addNode('start-end', 'BİTİŞ')">⚪ Bitiş (Elips)</button>
        <hr>
        <button class="run-btn" onclick="runAlgorithm()">▶ ALGORİTMAYI ÇALIŞTIR</button>
        <button onclick="clearCanvas()" style="color: red;">Temizle</button>
    </div>

    <div id="canvas" id="canvas">
        <!-- Akış şeması elemanları buraya gelecek -->
    </div>

    <div id="console">
        <strong>Sistem Çıktısı:</strong><br>
        <div id="log"></div>
    </div>
</div>

<script>
    let nodeCount = 0;

    function addNode(type, label) {
        nodeCount++;
        const canvas = document.getElementById('canvas');
        const div = document.createElement('div');
        div.id = 'node-' + nodeCount;
        div.className = 'node ' + type;
        div.style.left = '50px';
        div.style.top = (nodeCount * 60) + 'px';
        
        let content = '';
        if(type === 'process') {
            content = `
                <select>
                    <option>Toplama (+)</option>
                    <option>Mod Alma (%)</option>
                    <option>Ortalama Al</option>
                    <option>Değişken Ata</option>
                </select>`;
        } else if(type === 'decision') {
            content = `<div class="decision-content"><input type="text" placeholder="A > B?" style="width:50px"></div>`;
        } else {
            content = `<span>${label}</span>`;
        }

        div.innerHTML = content;
        
        // Sürükleme fonksiyonu
        div.onmousedown = function(e) {
            let shiftX = e.clientX - div.getBoundingClientRect().left;
            let shiftY = e.clientY - div.getBoundingClientRect().top;
            
            function moveAt(pageX, pageY) {
                div.style.left = pageX - shiftX - canvas.offsetLeft + 'px';
                div.style.top = pageY - shiftY - canvas.offsetTop + 'px';
            }

            function onMouseMove(e) { moveAt(e.pageX, e.pageY); }
            document.addEventListener('mousemove', onMouseMove);
            div.onmouseup = function() {
                document.removeEventListener('mousemove', onMouseMove);
                div.onmouseup = null;
            };
        };

        canvas.appendChild(div);
    }

    function logToConsole(msg) {
        const log = document.getElementById('log');
        log.innerHTML += "> " + msg + "<br>";
    }

    function runAlgorithm() {
        const log = document.getElementById('log');
        log.innerHTML = ""; // Konsolu temizle
        logToConsole("Algoritma başlatılıyor...");
        
        // Basit bir simülasyon (9. Sınıf Mantığı)
        const nodes = document.querySelectorAll('.node');
        if(nodes.length === 0) {
            logToConsole("Hata: Şemada eleman yok!");
            return;
        }

        nodes.forEach(node => {
            if(node.classList.contains('process')) {
                const val = node.querySelector('select').value;
                logToConsole("İşlem yapıldı: " + val);
            }
            if(node.classList.contains('input-output')) {
                logToConsole("Veri girişi/çıkışı algılandı.");
            }
        });

        logToConsole("Algoritma başarıyla tamamlandı.");
    }

    function clearCanvas() {
        document.getElementById('canvas').innerHTML = "";
        document.getElementById('log').innerHTML = "";
        nodeCount = 0;
    }
</script>

</body>
</html>
